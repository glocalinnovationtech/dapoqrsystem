<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | DAPO QR Generator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#dff8d8;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#2e7d32;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:1px solid #bbb;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

.reset-btn{
    background:#4CAF50;
    color:white;
}

.reset-btn:hover{
    background:#388E3C;
}

.back-btn{
    background:#2196F3;
    color:white;
}

.back-btn:hover{
    background:#1565C0;
}

.message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>🔐 Forgot Password</h2>

<label>Recovery Email</label>

<input
type="email"
id="email"
placeholder="Enter recovery email">

<label>Security Question</label>

<select id="question">

<option value="">Select a Question</option>

<option>What is your favorite color?</option>

<option>What is your first pet's name?</option>

<option>What city were you born in?</option>

<option>What is your favorite food?</option>

</select>

<label>Security Answer</label>

<input
type="text"
id="answer"
placeholder="Enter your answer">

<label>New Password</label>

<input
type="password"
id="newPassword"
placeholder="New Password">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button
class="reset-btn"
onclick="resetPassword()">

Reset Password

</button>

<button
class="back-btn"
onclick="window.location.href='admin.html'">

⬅ Back to Admin

</button>

<div
id="message"
class="message"></div>

</div>

<script>

// Demo recovery information
if(localStorage.getItem("recoveryEmail")==null){

localStorage.setItem("recoveryEmail","admin@gmail.com");

localStorage.setItem("securityQuestion","What is your favorite color?");

localStorage.setItem("securityAnswer","green");

}

if(localStorage.getItem("adminPassword")==null){

localStorage.setItem("adminPassword","admin123");

}

function resetPassword(){

let email=document.getElementById("email").value.trim();

let question=document.getElementById("question").value;

let answer=document.getElementById("answer").value.trim();

let newPassword=document.getElementById("newPassword").value;

let confirmPassword=document.getElementById("confirmPassword").value;

let message=document.getElementById("message");

message.innerHTML="";
message.className="message";

let savedEmail=localStorage.getItem("recoveryEmail");

let savedQuestion=localStorage.getItem("securityQuestion");

let savedAnswer=localStorage.getItem("securityAnswer");

if(email!=savedEmail){

message.innerHTML="❌ Recovery email is incorrect.";

message.classList.add("error");

return;

}

if(question!=savedQuestion){

message.innerHTML="❌ Incorrect security question.";

message.classList.add("error");

return;

}

if(answer.toLowerCase()!=savedAnswer.toLowerCase()){

message.innerHTML="❌ Incorrect security answer.";

message.classList.add("error");

return;

}

if(newPassword.length<6){

message.innerHTML="❌ Password must be at least 6 characters.";

message.classList.add("error");

return;

}

if(newPassword!=confirmPassword){

message.innerHTML="❌ Passwords do not match.";

message.classList.add("error");

return;

}

localStorage.setItem("adminPassword",newPassword);

message.innerHTML="✅ Password has been reset successfully!";

message.classList.add("success");

setTimeout(function(){

window.location.href="login.html";

},2000);

<center>

<button onclick="window.location.href='admin.html'">
⬅ Back to Admin Dashboard
</button>

</center>
}

</script>

</body>
</html>
