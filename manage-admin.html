<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Admins | DAPO QR Generator</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#d8f8d4;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2e7d32;
    margin-bottom:25px;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}

.toolbar input{
    width:300px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    font-size:14px;
}

.add-btn{
    background:#2e7d32;
}

.edit-btn{
    background:#1976d2;
}

.delete-btn{
    background:#d32f2f;
}

.back-btn{
    background:#555;
    margin-top:20px;
}

button:hover{
    opacity:.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

table th{
    background:#43a047;
    color:white;
}

.status-active{
    color:green;
    font-weight:bold;
}

.status-inactive{
    color:red;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h1><i class="fa-solid fa-users"></i> Manage Admin Users</h1>

<div class="toolbar">

<input
type="text"
id="searchAdmin"
placeholder="🔍 Search username..."
onkeyup="searchAdmin()">

<button class="add-btn"
onclick="window.location.href='create-admin.html'">
<i class="fa fa-user-plus"></i>
Create Admin
</button>

</div>

<table id="adminTable">

<thead>

<tr>

<th>#</th>
<th>Username</th>
<th>Role</th>
<th>Status</th>
<th>Last Login</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr>

<td>1</td>
<td>admin</td>
<td>Super Administrator</td>
<td class="status-active">Active</td>
<td>July 4, 2026 - 10:35 AM</td>

<td>

<button class="edit-btn">
<i class="fa fa-pen"></i>
Edit
</button>

<button class="delete-btn"
onclick="deleteAdmin(this)">
<i class="fa fa-trash"></i>
Delete
</button>

</td>

</tr>

<tr>

<td>2</td>
<td>staff01</td>
<td>Administrator</td>
<td class="status-active">Active</td>
<td>July 3, 2026 - 4:20 PM</td>

<td>

<button class="edit-btn">
<i class="fa fa-pen"></i>
Edit
</button>

<button class="delete-btn"
onclick="deleteAdmin(this)">
<i class="fa fa-trash"></i>
Delete
</button>

</td>

</tr>

</tbody>

</table>

<center>

<button class="back-btn"
onclick="window.location.href='admin.html'">

<i class="fa fa-arrow-left"></i>

Back to Dashboard

</button>

</center>

</div>

<script>

function deleteAdmin(button){

if(confirm("Are you sure you want to delete this administrator?")){

button.parentElement.parentElement.remove();

}

}

function searchAdmin(){

let input=document.getElementById("searchAdmin").value.toLowerCase();

let table=document.getElementById("adminTable");

let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let td=tr[i].getElementsByTagName("td")[1];

if(td){

let txt=td.textContent.toLowerCase();

tr[i].style.display=
txt.indexOf(input)>-1 ? "" : "none";

}

}

}

</script>

</body>
</html>
