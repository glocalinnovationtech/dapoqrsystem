<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAPO AI Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#dff8d8;
}

.container{
    width:700px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    overflow:hidden;
}

.header{
    background:#4CAF50;
    color:white;
    text-align:center;
    padding:18px;
    font-size:24px;
    font-weight:bold;
}

.chat-area{
    height:450px;
    overflow-y:auto;
    padding:20px;
    background:#f7fff5;
}

.bot,
.user{

    max-width:75%;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    line-height:1.5;

}

.bot{
    background:#e8f5e9;
}

.user{
    background:#4CAF50;
    color:white;
    margin-left:auto;
}

.time{
    font-size:11px;
    margin-top:5px;
    opacity:.7;
}

.footer{
    display:flex;
    padding:15px;
    background:#ffffff;
}

.footer input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.footer button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.send{
    background:#4CAF50;
    color:white;
}

.send:hover{
    background:#388E3C;
}

.clear{
    background:#f44336;
    color:white;
}

.clear:hover{
    background:#d32f2f;
}

.back{
    background:#2196F3;
    color:white;
}

.back:hover{
    background:#1565C0;
}

.buttons{
    text-align:center;
    padding:15px;
    background:#f5f5f5;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

🤖 DAPO AI Assistant

</div>

<div class="chat-area" id="chatArea">

<div class="bot">

Hello Administrator! 👋<br><br>

I can help you with:

<ul>
<li>QR Code</li>
<li>Records</li>
<li>Printing</li>
<li>Export Excel</li>
<li>Export PDF</li>
<li>Password</li>
<li>Admin Account</li>
</ul>

<div class="time" id="welcomeTime"></div>

</div>

</div>

<div class="footer">

<input
type="text"
id="userInput"
placeholder="Type your question..."
onkeypress="if(event.key==='Enter')sendMessage()">

<button class="send"
onclick="sendMessage()">

Send

</button>

</div>

<div class="buttons">

<button class="clear"
onclick="clearChat()">

🗑 Clear Chat

</button>

<button class="back"
onclick="window.location.href='admin.html'">

⬅ Back

</button>

</div>

</div>

<script>

document.getElementById("welcomeTime").innerHTML=
new Date().toLocaleTimeString();

function sendMessage(){

let input=document.getElementById("userInput");

let message=input.value.trim();

if(message=="") return;

let chat=document.getElementById("chatArea");

chat.innerHTML+=`
<div class="user">
${message}
<div class="time">${new Date().toLocaleTimeString()}</div>
</div>
`;

let reply="";

let text=message.toLowerCase();

if(text.includes("qr")){

reply="To generate a QR Code, fill in the form and click Generate QR Code.";

}

else if(text.includes("record")){

reply="You can view all QR records from the Records page.";

}

else if(text.includes("delete")){

reply="Click the Delete button beside a record or use Clear All Records.";

}

else if(text.includes("excel")){

reply="Use the Export Excel button on the Records page.";

}

else if(text.includes("pdf")){

reply="Use the Export PDF button on the Records page.";

}

else if(text.includes("print")){

reply="Use the Print button to print the QR records.";

}

else if(text.includes("password")){

reply="Go to Change Password in the Admin Settings.";

}

else if(text.includes("admin")){

reply="Create or manage administrators through the Admin Settings.";

}

else if(text.includes("hello") || text.includes("hi")){

reply="Hello Admin! 😊 How can I help you today?";

}

else{

reply="Sorry, I don't understand your question. Please try asking about QR Codes, Records, Passwords, Printing, Excel, or PDF.";

}

setTimeout(function(){

chat.innerHTML+=`
<div class="bot">
${reply}
<div class="time">${new Date().toLocaleTimeString()}</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

},500);

input.value="";

chat.scrollTop=chat.scrollHeight;

}

function clearChat(){

if(confirm("Clear the conversation?")){

document.getElementById("chatArea").innerHTML="";

}
<center>

<button onclick="window.location.href='admin.html'">
⬅ Back to Admin Dashboard
</button>

</center>
}

</script>

</body>
</html>
