<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password | DAPO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#dff8d8;
}

.container{
    width:450px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#2e7d32;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:1px solid #bbb;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.save-btn{
    background:#4CAF50;
    color:white;
}

.save-btn:hover{
    background:#388E3C;
}

.back-btn{
    background:#2196F3;
    color:white;
}

.back-btn:hover{
    background:#1976D2;
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

.password-strength{
    margin-top:8px;
    font-size:14px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🔐 Change Password</h2>

<label>Current Password</label>
<input type="password" id="currentPassword">

<label>New Password</label>
<input type="password"
id="newPassword"
onkeyup="checkStrength()">

<div id="strength"
class="password-strength"></div>

<label>Confirm New Password</label>
<input type="password" id="confirmPassword">

<br><br>

<input
type="checkbox"
onclick="togglePassword()">

Show Passwords

<button
class="save-btn"
onclick="changePassword()">

Change Password

</button>

<button
class="back-btn"
onclick="window.location.href='admin.html'">

⬅ Back to Dashboard

</button>

<div id="message"
class="message"></div>

</div>

<script>

// Default password if none exists
if(localStorage.getItem("adminPassword")==null){

    localStorage.setItem("adminPassword","admin123");

}

function changePassword(){

let current=document.getElementById("currentPassword").value;

let newPass=document.getElementById("newPassword").value;

let confirm=document.getElementById("confirmPassword").value;

let savedPassword=localStorage.getItem("adminPassword");

let msg=document.getElementById("message");

msg.innerHTML="";
msg.className="message";

if(current!==savedPassword){

    msg.innerHTML="❌ Current password is incorrect.";
    msg.classList.add("error");
    return;

}

if(newPass.length<6){

    msg.innerHTML="❌ Password must be at least 6 characters.";
    msg.classList.add("error");
    return;

}

if(newPass!==confirm){

    msg.innerHTML="❌ Passwords do not match.";
    msg.classList.add("error");
    return;

}

localStorage.setItem("adminPassword",newPass);

msg.innerHTML="✅ Password changed successfully!";
msg.classList.add("success");

document.getElementById("currentPassword").value="";
document.getElementById("newPassword").value="";
document.getElementById("confirmPassword").value="";
document.getElementById("strength").innerHTML="";

}

function togglePassword(){

let fields=document.querySelectorAll("input[type=password], input[type=text]");

let current=document.getElementById("currentPassword");
let newPass=document.getElementById("newPassword");
let confirm=document.getElementById("confirmPassword");

if(current.type==="password"){

current.type="text";
newPass.type="text";
confirm.type="text";

}else{

current.type="password";
newPass.type="password";
confirm.type="password";

}

}

function checkStrength(){

let password=document.getElementById("newPassword").value;

let strength=document.getElementById("strength");

if(password.length==0){

strength.innerHTML="";
return;

}

if(password.length<6){

strength.innerHTML="🔴 Weak Password";

strength.style.color="red";

}
else if(password.length<10){

strength.innerHTML="🟡 Medium Password";

strength.style.color="orange";

}
else{

strength.innerHTML="🟢 Strong Password";

strength.style.color="green";

}

}
<center>

<button onclick="window.location.href='admin.html'">
⬅ Back to Admin Dashboard
</button>

</center>
</script>

</body>
</html>
